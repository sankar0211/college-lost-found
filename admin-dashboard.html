<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="adminDashboard">

<nav class="dashboard-nav">
  <div>
    <h2>Admin Dashboard</h2>
    <p id="userInfo"></p>
  </div>
  <div class="nav-actions">
    <a href="admin-users.html" class="nav-btn">Users</a>
    <a href="admin-items.html" class="nav-btn">Items</a>
    <a href="admin-complaints.html" class="nav-btn">Complaints</a>
    <button onclick="toggleDarkMode()" class="nav-btn">🌙</button>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </div>
</nav>

<main class="container">
  <section class="stats">
    <div class="stat-card">
      <h3 id="totalUsers">0</h3>
      <p>Total Users</p>
    </div>

    <div class="stat-card">
      <h3 id="totalItems">0</h3>
      <p>Total Items</p>
    </div>

    <div class="stat-card">
      <h3 id="pendingItems">0</h3>
      <p>Pending Items</p>
    </div>

    <div class="stat-card">
      <h3 id="totalClaims">0</h3>
      <p>Total Claims</p>
    </div>

    <div class="stat-card">
      <h3 id="openComplaints">0</h3>
      <p>Open Complaints</p>
    </div>

    <div class="stat-card">
      <h3 id="returnedItems">0</h3>
      <p>Returned Items</p>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
