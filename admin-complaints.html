<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Complaints</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body data-page="adminComplaints">

<nav class="dashboard-nav">

  <div>
    <h2 data-i18n="complaints">Complaints & Support</h2>
    <p id="userInfo"></p>
  </div>

  <div class="nav-actions">

    <a href="admin-dashboard.html" class="nav-btn" data-i18n="adminDashboard">
      Dashboard
    </a>

    <a href="admin-users.html" class="nav-btn" data-i18n="manageUsers">
      Users
    </a>

    <a href="admin-items.html" class="nav-btn" data-i18n="manageItems">
      Items
    </a>

    <label class="theme-switch">
      <input type="checkbox" id="themeToggle">
      <span class="theme-slider"></span>
    </label>

    <button id="logoutBtn" class="logout-btn" data-i18n="logout">
      Logout
    </button>

  </div>

</nav>

<main class="container">

  <div class="complaints-layout">

    <!-- LEFT SIDE -->

    <section class="panel">

      <h3 data-i18n="allComplaints">
        All Complaints
      </h3>

      <div id="adminComplaintsList">

        <div class="empty">
          Loading complaints...
        </div>

      </div>

    </section>

    <!-- RIGHT SIDE -->

    <section class="panel">

      <h3 data-i18n="chatWithUser">
        Chat With User
      </h3>

      <div id="adminChatMessages" class="chat-box">

        <div class="empty">
          Select a complaint to view messages.
        </div>

      </div>

      <form id="adminReplyForm">

        <textarea
          id="adminReplyText"
          rows="3"
          placeholder="Type reply..."
          data-i18n-placeholder="replyPlaceholder"
        ></textarea>

        <button
          type="submit"
          class="btn primary full"
          data-i18n="sendReply">
          Send Reply
        </button>

      </form>

    </section>

  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
