<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Found Item</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="upload">

<nav class="dashboard-nav">
  <div>
    <h2>Upload Found Item</h2>
    <p id="userInfo"></p>
  </div>
  <button id="logoutBtn" class="logout-btn">Logout</button>
</nav>

<main class="container">
  <section class="form-layout">

    <form id="uploadForm" class="panel">
      <h3>Item Details</h3>

      <label>Item Name</label>
      <input type="text" id="itemName" placeholder="Example: Black Wallet" required />

      <label>Category</label>
      <select id="category" required>
        <option value="">Select Category</option>
        <option value="ID Card">ID Card</option>
        <option value="Wallet">Wallet</option>
        <option value="Bag">Bag</option>
        <option value="Electronics">Electronics</option>
        <option value="Books">Books</option>
        <option value="Keys">Keys</option>
        <option value="Others">Others</option>
      </select>

      <label>Description</label>
      <textarea id="description" rows="4" placeholder="Mention color, brand, unique marks..." required></textarea>

      <label>Found Location</label>
      <input type="text" id="location" placeholder="Example: Library entrance" required />

      <label>Found Date</label>
      <input type="date" id="date" required />

      <label>Contact Number</label>
      <input type="tel" id="contact" placeholder="Example: 9876543210" required />

      <label>Upload Image</label>
      <input type="file" id="imageInput" accept="image/*" />

      <button type="submit" class="btn primary full">Submit Found Item</button>
    </form>

    <div class="panel preview-box">
      <h3>Image Preview</h3>
      <img id="imagePreview" src="" alt="Preview will appear here" />
      <p class="muted">Selected image will be uploaded to Supabase Storage.</p>
    </div>

  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
