<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages / Complaints</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="complaints">

<nav class="dashboard-nav">
  <div>
    <h2>Messages / Complaints</h2>
    <p id="userInfo"></p>
  </div>
  <div class="nav-actions">
    <button onclick="goDashboard()" class="nav-btn">Dashboard</button>
    <button onclick="toggleDarkMode()" class="nav-btn">🌙</button>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </div>
</nav>

<main class="container">
  <section class="form-layout">
    <form id="complaintForm" class="panel">
      <h3>Raise New Complaint</h3>

      <label>Subject</label>
      <input type="text" id="complaintSubject" placeholder="Example: Claim not updated" required />

      <label>Message</label>
      <textarea id="complaintMessageInput" rows="5" placeholder="Explain your issue..." required></textarea>

      <button type="submit" class="btn primary full">Send to Admin</button>
    </form>

    <section class="panel">
      <h3>My Complaints</h3>
      <div id="complaintsList"></div>
    </section>
  </section>

  <section class="panel chat-panel">
    <h3>Conversation</h3>
    <div id="chatMessages" class="chat-box"></div>

    <form id="replyForm" class="reply-form">
      <input type="text" id="replyText" placeholder="Type a reply..." />
      <button class="btn primary">Send</button>
    </form>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
