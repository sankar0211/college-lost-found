<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Campus Lost & Found</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login">

<div class="auth-page">
  <div class="auth-card">
    <a href="index.html" class="back-link">← Back to Home</a>

    <h2>Login / Register</h2>
    <p class="muted">
      No email. No OTP. Use Register No / Staff ID / Visitor ID and password.
    </p>

    <form id="loginForm">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Enter your name" required />

      <label>Register No / Staff ID / Visitor ID</label>
      <input type="text" id="collegeId" placeholder="Example: 24I355" required />

      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="Example: 9876543210" required />

      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" required />

      <label>Login As</label>
      <select id="role" required>
        <option value="lost">Lost Item User</option>
        <option value="found">Found Item Reporter</option>
      </select>

      <button type="submit" class="btn primary full">Continue</button>
    </form>

    <p id="loginMessage" class="message"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
