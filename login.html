<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Campus Lost & Found</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login">

<div class="auth-page">
  <div class="auth-card animated-card">

    <a href="index.html" class="back-link">← Back to Home</a>

    <div class="top-row">
      <div>
        <h2 id="authTitle">Login</h2>
        <p class="muted">Use your User ID and password.</p>
      </div>

      <label class="theme-switch">
        <input type="checkbox" id="themeToggle">
        <span class="theme-slider"></span>
      </label>
    </div>

    <div class="action-choice">
      <p class="muted">What do you want to do?</p>

      <div class="choice-grid">
        <label>
          <input type="radio" name="nextAction" value="browse" checked>
          <span>Search Items</span>
        </label>

        <label>
          <input type="radio" name="nextAction" value="lost">
          <span>Report Lost Item</span>
        </label>

        <label>
          <input type="radio" name="nextAction" value="found">
          <span>Report Found Item</span>
        </label>
      </div>
    </div>

    <div class="auth-tabs">
      <button id="loginTab" class="active" type="button">Login</button>
      <button id="registerTab" type="button">Register</button>
    </div>

    <form id="loginForm">
      <label>User ID / Register No / Staff ID / Visitor ID</label>
      <input type="text" id="loginUserId" placeholder="Example: 24I355" required />

      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="loginPassword" placeholder="Enter password" required />
        <button type="button" onclick="togglePassword('loginPassword')">👁</button>
      </div>

      <button type="submit" class="btn primary full">
        <span class="btn-text">Login</span>
      </button>
    </form>

    <form id="registerForm" class="hidden">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Enter your name" required />

      <label>User ID / Register No / Staff ID / Visitor ID</label>
      <input type="text" id="regUserId" placeholder="Example: 24I355" required />

      <label>Phone Number</label>
      <input type="tel" id="regPhone" placeholder="Example: 9876543210" required />

      <label>User Type</label>
      <select id="regUserType" required>
        <option value="">Select User Type</option>
        <option value="student">Student</option>
        <option value="faculty">Faculty</option>
        <option value="assistant_professor">Assistant Professor</option>
        <option value="professor">Professor</option>
        <option value="parent">Parent</option>
        <option value="visitor">Visitor</option>
        <option value="staff">Security / Staff</option>
        <option value="public">General Public</option>
      </select>

      <label>Create Password</label>
      <div class="password-wrapper">
        <input type="password" id="regPassword" placeholder="Minimum 8 characters" required />
        <button type="button" onclick="togglePassword('regPassword')">👁</button>
      </div>

      <label>Confirm Password</label>
      <div class="password-wrapper">
        <input type="password" id="confirmPassword" placeholder="Re-enter password" required />
        <button type="button" onclick="togglePassword('confirmPassword')">👁</button>
      </div>

      <button type="submit" class="btn primary full">
        <span class="btn-text">Create Account</span>
      </button>
    </form>

    <p id="authMessage" class="message"></p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
