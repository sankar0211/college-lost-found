<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Details</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="itemDetails">

<nav class="dashboard-nav">
  <div>
    <h2>Item Details</h2>
    <p id="userInfo"></p>
  </div>
  <button id="logoutBtn" class="logout-btn">Logout</button>
</nav>

<main class="container">
  <a href="lost-dashboard.html" class="back-link">← Back to Dashboard</a>

  <section id="detailsBox" class="details-box"></section>

  <section id="claimSection" class="panel claim-panel">
    <h3>Claim This Item</h3>
    <p class="muted">Enter proof to show that this item belongs to you.</p>

    <form id="claimForm">
      <textarea id="proof" rows="4" placeholder="Example: My calculator has a blue sticker on the back." required></textarea>
      <button type="submit" class="btn primary">Send Claim Request</button>
    </form>

    <p id="claimMessage" class="message"></p>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/app.js"></script>

</body>
</html>
